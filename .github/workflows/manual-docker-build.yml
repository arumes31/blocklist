name: Manual Docker Build

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Additional custom tag (optional)'
        required: false
        type: string
      push_latest:
        description: 'Also tag and push as :latest'
        required: true
        type: boolean
        default: false

jobs:
  build-and-push:
    name: Manual Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Blocklist Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ${{ github.event.inputs.tag_name != '' && format('ghcr.io/{0}:{1}', github.repository, github.event.inputs.tag_name) || '' }}
            ${{ github.event.inputs.push_latest == 'true' && format('ghcr.io/{0}:latest', github.repository) || '' }}
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
