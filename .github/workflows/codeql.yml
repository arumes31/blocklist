name: "CodeQL"

on:
  push:
    branches: [ "main", "v2_test" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 1 * * 1' # Weekly scan at 01:30 on Monday

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        language: [ 'go' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Setup Go to ensure the environment is ready for compilation-based analysis
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    # Initialize CodeQL. If this fails with ECONNRESET locally, consider using --toolcache in act.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        # Setting tools: latest explicitly helps ensure we get the latest compatible bundle
        tools: latest

    # Go analysis usually works best with 'autobuild' for standard layouts.
    - name: Autobuild
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
